version: '3'

services:
  devct:
    build:
      context: .
      dockerfile: Containerfile
      args:
        PASS: ${PASS}
    image: devct
    container_name: devct
    hostname: "devct"
    volumes:
      - local_share:/home/connor/.local/share
      - ssh:/home/connor/.ssh
      - ${HOME}/out:/home/connor/out

volumes:
  local_share:
    name: "devct_local_share"
  ssh:
    name: "devct_ssh"
